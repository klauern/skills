    --green-bg: rgba(158, 206, 106, 0.12);

    --yellow: #e0af68;
    --orange: #ff9e64;
    --purple: #bb9af7;
    --cyan: #7dcfff;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--blue); }
  .preset-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .preset-bar span { color: var(--text-dim); font-size: 13px; margin-right: 4px; }
  .preset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--blue); color: var(--blue); }
  .stats-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex;
    gap: 24px;
    font-size: 13px;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .stat-dot.pending { background: var(--text-dim); }
  .stat-dot.approved { background: var(--green); }
  .stat-dot.rejected { background: var(--red); }
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: calc(100vh - 130px);
    overflow: hidden;
  }
  .panel {
    overflow-y: auto;
    padding: 20px;
  }
  .panel:first-child { border-right: 1px solid var(--border); }
  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  /* Suggestion cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card.approved { border-color: var(--green); }
  .card.rejected { border-color: var(--red); }
  .card-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-id {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-badges { display: flex; gap: 6px; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .badge.category { background: rgba(122, 162, 247, 0.15); color: var(--blue); }
  .badge.severity-high { background: rgba(247, 118, 142, 0.15); color: var(--red); }
  .badge.severity-medium { background: rgba(224, 175, 104, 0.15); color: var(--yellow); }
  .badge.severity-low { background: rgba(86, 95, 137, 0.2); color: var(--text-dim); }
  .card-body { padding: 16px; }
  .card-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
  .diff-block {
    background: var(--bg);
    border-radius: 6px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
  }
  .diff-line { padding: 1px 12px; white-space: pre; }
  .diff-line.removed { background: var(--red-bg); color: var(--red); }
  .diff-line.added { background: var(--green-bg); color: var(--green); }
  .diff-line.context { color: var(--text-dim); }
  .card-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-approve { background: rgba(158, 206, 106, 0.15); color: var(--green); border-color: var(--green); }
  .btn-approve:hover { background: rgba(158, 206, 106, 0.25); }
  .btn-approve.active { background: var(--green); color: var(--bg); }
  .btn-reject { background: rgba(247, 118, 142, 0.15); color: var(--red); border-color: var(--red); }
  .btn-reject:hover { background: rgba(247, 118, 142, 0.25); }
  .btn-reject.active { background: var(--red); color: var(--bg); }
  .btn-reset-one { background: transparent; color: var(--text-dim); border-color: var(--border); }
  .btn-reset-one:hover { color: var(--text); border-color: var(--text-dim); }
  .card-comment {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;

    background: var(--bg);

    color: var(--text);
    padding: 4px 8px;
    font-size: 12px;

  .card-comment label { font-size: 11px; color: var(--text-dim); }

    background: var(--blue);

    font-size: 12px;
    font-weight: 600;

  .prompt-output {

    border-radius: 8px;
    padding: 16px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    max-height: 400px;

    white-space: pre-wrap;

    color: var(--text-dim);
    font-style: italic;
    font-family: inherit;

// Which suggestions overlap in the file (edit the same block)
// Suggestions 5 and 8 both modify the hooks block. If both are approved,
// we compose a single edit. Suggestion 8 is a subset of suggestion 5's proposed text.
const HOOKS_OVERLAP = [5, 8];

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function computeDiffHtml(current, proposed) {
  const oldLines = current.split('\n');
  const newLines = proposed.split('\n');
  const html = [];

  // Simple line-based diff
  const maxOld = new Set(oldLines);
  const maxNew = new Set(newLines);

  let oi = 0, ni = 0;
  while (oi < oldLines.length || ni < newLines.length) {
    if (oi < oldLines.length && ni < newLines.length && oldLines[oi] === newLines[ni]) {
      html.push(`<div class="diff-line context"> ${escapeHtml(oldLines[oi])}</div>`);
      oi++; ni++;
    } else {
      // Find how many lines differ
      let oEnd = oi, nEnd = ni;
      // Look ahead for next match
      let foundMatch = false;
      for (let look = 0; look < 50 && !foundMatch; look++) {
        for (let j = 0; j <= look; j++) {
          if (oi + j < oldLines.length && ni + (look - j) < newLines.length &&
              oldLines[oi + j] === newLines[ni + (look - j)]) {
            oEnd = oi + j;
            nEnd = ni + (look - j);
            foundMatch = true;
            break;
          }
        }
      }
      if (!foundMatch) { oEnd = oldLines.length; nEnd = newLines.length; }
      for (let i = oi; i < oEnd; i++) {
        html.push(`<div class="diff-line removed">-${escapeHtml(oldLines[i])}</div>`);
      }
      for (let i = ni; i < nEnd; i++) {
        html.push(`<div class="diff-line added">+${escapeHtml(newLines[i])}</div>`);
      }
      oi = oEnd; ni = nEnd;
    }
  }
  return html.join('');
}

function renderStats() {
  const counts = { pending: 0, approved: 0, rejected: 0 };
  suggestions.forEach(s => counts[s.status]++);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-dot pending"></div> ${counts.pending} Pending</div>
    <div class="stat"><div class="stat-dot approved"></div> ${counts.approved} Approved</div>
    <div class="stat"><div class="stat-dot rejected"></div> ${counts.rejected} Rejected</div>
    <div class="stat" style="margin-left:auto;color:var(--text-dim)">
      File: <span style="color:var(--cyan);font-family:monospace;font-size:12px">AGENTS.md</span>
    </div>
  `;
}

function renderDocSections() {
  // Group by section
  const sections = {};
  suggestions.forEach(s => {
    if (!sections[s.section]) sections[s.section] = [];
    sections[s.section].push(s);
  });

  const container = document.getElementById('docSections');
  container.innerHTML = '';

  for (const [section, items] of Object.entries(sections)) {
    const worstStatus = items.some(i => i.status === 'approved') ? 'approved' :
                         items.some(i => i.status === 'rejected') ? 'rejected' : '';
    const div = document.createElement('div');
    div.className = `doc-section ${worstStatus}`;
    div.innerHTML = `
      <div class="doc-section-header">
        <h3>${section}</h3>
        <div class="doc-suggestion-ids">
          ${items.map(i => `<span class="doc-suggestion-id ${i.status}">#${i.id}</span>`).join('')}
        </div>
      </div>
      <div class="doc-section-body">${items.map(i => {
        const text = i.status === 'approved' ? i.proposedText : i.currentText;
        return `<div class="doc-highlight">${escapeHtml(text)}</div>`;
      }).join('\n')}</div>
    `;
    container.appendChild(div);
  }
}

function renderCards() {
  const container = document.getElementById('suggestionCards');
  container.innerHTML = '';

  suggestions.forEach(s => {
    const card = document.createElement('div');
    card.className = `card ${s.status}`;
    card.id = `card-${s.id}`;

    const severityClass = `severity-${s.severity}`;
    const diffHtml = computeDiffHtml(s.currentText, s.proposedText);

    card.innerHTML = `
      <div class="card-header">
        <div class="card-header-left">
          <span class="card-id">#${s.id}</span>
          <span class="card-title">${s.title}</span>
        </div>
        <div class="card-badges">
          <span class="badge category">${s.category}</span>
          <span class="badge ${severityClass}">${s.severity}</span>
          <span style="font-size:11px;color:var(--text-dim);font-family:monospace">${s.lineRef}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-desc">${s.description}</div>
        <div class="diff-block">${diffHtml}</div>
      </div>
      <div class="card-actions">
        <button class="btn btn-approve ${s.status === 'approved' ? 'active' : ''}"
                onclick="setStatus(${s.id}, 'approved')">Approve</button>
        <button class="btn btn-reject ${s.status === 'rejected' ? 'active' : ''}"
                onclick="setStatus(${s.id}, 'rejected')">Reject</button>
        <button class="btn btn-reset-one" onclick="setStatus(${s.id}, 'pending')">Reset</button>
        <div class="card-comment">
          <label>Note:</label>
          <input type="text" value="${escapeHtml(s.userComment)}"
                 placeholder="Optional comment..."
                 onchange="setComment(${s.id}, this.value)">
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function setStatus(id, status) {
  const s = suggestions.find(s => s.id === id);
  if (s) { s.status = status; render(); }
}

function setComment(id, comment) {
  const s = suggestions.find(s => s.id === id);
  if (s) s.userComment = comment;
  generatePrompt();
}

function applyPreset(preset) {
  suggestions.forEach(s => {
    if (preset === 'all') s.status = 'approved';
    else if (preset === 'reset') s.status = 'pending';
    else if (preset === 'metadata') s.status = [1, 2, 3].includes(s.id) ? 'approved' : 'pending';
    else if (preset === 'docs') s.status = [4, 5, 6, 7, 8].includes(s.id) ? 'approved' : 'pending';
  });
  render();
}

function generatePrompt() {
  const approved = suggestions.filter(s => s.status === 'approved');
  const [hooksBlockId, hooksMatcherId] = HOOKS_OVERLAP;
  const bothHooksApproved =
    approved.some(s => s.id === hooksBlockId) &&
    approved.some(s => s.id === hooksMatcherId);
  const effectiveCount = approved.length - (bothHooksApproved ? 1 : 0);
  const output = document.getElementById('promptOutput');

  if (approved.length === 0) {
    output.innerHTML = '<span class="prompt-empty">No suggestions approved yet. Approve suggestions to generate edit instructions.</span>';
    return;
  }

  let prompt = `Apply the following ${effectiveCount} edit(s) to ${FILE_PATH}:\n\n`;

  approved.forEach(s => {
    if (s.id === hooksMatcherId && bothHooksApproved) return; // handled as part of suggestion 5

    let oldStr = s.currentText;
    let newStr = s.proposedText;

    // If suggestion 5 is approved and 8 is also approved, apply 8's matcher change inside 5's proposed text
    if (s.id === hooksBlockId && bothHooksApproved) {
      newStr = newStr.replace(
        '`block-grep-extended.sh` - PreToolUse: blocks',
        '`block-grep-extended.sh` - PreToolUse(Bash): blocks'
      );
    }

    // If only 8 is approved (not 5), use its own edit
    // (this is the default path)

    prompt += `---\n`;
    prompt += `## Edit #${s.id}: ${s.title}`;
    if (s.userComment) prompt += ` (${s.userComment})`;
    prompt += `\n${s.lineRef} | ${s.category} | ${s.severity}\n\n`;
    prompt += `**old_string:**\n\`\`\`\n${oldStr}\n\`\`\`\n\n`;
    prompt += `**new_string:**\n\`\`\`\n${newStr}\n\`\`\`\n\n`;
  });

  const rejected = suggestions.filter(s => s.status === 'rejected');
  if (rejected.length > 0) {
    prompt += `---\n## Explicitly Rejected\n`;
    rejected.forEach(s => {
      prompt += `- #${s.id}: ${s.title}`;
      if (s.userComment) prompt += ` \u2014 "${s.userComment}"`;
      prompt += `\n`;
    });
    prompt += '\n';
  }

  output.textContent = prompt;
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    btn.textContent = 'Copy failed';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 2000);
  });
}

function render() {
  renderStats();
  renderDocSections();
  renderCards();
  generatePrompt();
}

render();
</script>
